<!DOCTYPE html>
<html>
<head>
    <title>Reschedule Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ❄️ Particle Background -->
<div id="particles-js"></div>

<header>
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
    <h1>Reschedule Appointment</h1>
</header>

<div class="container">
    <form method="POST">
        <label>Date:</label>
        <input type="date" name="date" value="{{ appointment.date }}" required>
        <label>Time:</label>
        <input type="time" name="time" value="{{ appointment.time }}" required>
        <label>Reason:</label>
        <textarea name="reason" required>{{ appointment.reason }}</textarea>
        <label>Bath Type:</label>
        <select name="bath_type" required>
            {% for bath in bath_types %}
                <option value="{{ bath.name }}" {% if appointment.bath_type == bath.name %}selected{% endif %}>
                    {{ bath.name }} - ₹{{ bath.price }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Update Appointment</button>
    </form>

    <p><a href="{{ url_for('dashboard') }}">⬅ Back to Dashboard</a></p>
</div>

<!-- 💫 Particle Scripts -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="{{ url_for('static', filename='js/particles-config.js') }}"></script>

</body>
</html>
